<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reading Tracker{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f8fa;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .content {
            padding: 20px;
        }

        footer {
            text-align: center;
            padding: 10px;
            color: gray;
            font-size: 14px;
        }
    </style>
    <style>
.dashboard-container {
    background-color: #fff;
    padding: 30px;
    margin: 30px auto;
    max-width: 600px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.dashboard-container h2 {
    color: #333;
    margin-bottom: 20px;
}

.stats-card {
    background-color: #f9fafb;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.stats-card h3 {
    color: #4CAF50;
    margin-bottom: 15px;
}

.stats-card ul {
    list-style-type: none;
    padding: 0;
}

.stats-card li {
    font-size: 16px;
    margin: 8px 0;
    color: #555;
}
.navbar {
            background-color: #3a7ca5;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            align-items: center;
        }
.logout-btn {
    display: inline-block;
    background-color: #e74c3c;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background 0.3s ease;
}

.logout-btn:hover {
    background-color: #c0392b;
}
</style>
</head>
<body>
    <header>
        <nav class="navbar">
    <h1>📚 Reading Tracker</h1>
    <a href="{{ url_for('auth.logout') }}" class="logout-btn">Logout</a>
  </nav>
    </header>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        &copy; 2025 Reading Tracker App
    </footer>
</body>
</html>
